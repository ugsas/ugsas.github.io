- date: 1939
  img: 
  title: Glasgow University students propose to form  a UAS
  desc: In 1939 Glasgow University students, led by engineering student Alex D Stewart, put forward a proposal for a UAS to be developed at our very own University.  However, this was unfortunately declined. Instead, a section of the RAFVR was opened. They intended to complete flying training at Grangemouth Aerodrome with No 35 EFTS and aside from medical students, anyone studying at the University of Glasgow was eligible to apply.

- date: 13 Jan 1941
  img: 
  title: Glasgow University Air Squadron is founded
  desc: It became clear after the outbreak of war that there was, in the Universities and University Colleges, a considerable number of young people who were eager to start their training for aircrew duties during their spare time at University and upon realising their potential to support the War effort, 20 new University Air Squadrons were formed, including Glasgow, the following year in 1941 as part of the Air Training Corps. It was then, in January of 1941, that Glasgow University Air Squadron then came into being, with its headquarters originally being stationed in a room at a building owned by the University, No.1 University Gardens. 

- date: 13 Jan 1941
  img:
  title: Wg Cdr Kenneth Harries Riversdale-Elliot becomes the first OC GUAS
  desc:  Wg Cdr Kenneth Harries Riversdale-Elliot took his place as the first OC GUAS, following an extensive military career which began in the Royal Flying Corps during World War One.  During this time, he was known to fly a selection of biplanes including BE2Cs, Bristol Scouts and Airco DH.2s.  Later in his flying career, he received a distinguished service order while in command of No 27 (Bomber) Sqn for valuable services rendered in connection with the Mohmand Campaign of 1935.  In the Second World War, Wg Cdr Riversdale-Elliot served in France, the Middle East and North Africa with No 88 Hong Kong Bomber Sqn and No 218 Gold Coast Sqn.  It is no surprise from his remarkable experiences that he was the recipient of numerous awards with the entire collection being sold for £1,900 at auction in 1996.

- date: 13 Jan 1941
  img:
  title: Miss Margaret Sinclair becomes secretary to OC GUAS
  desc: Another prominent member of GUAS, whose career began during the formation of the Squadron and who was often described as “running the show” was a miss Margaret Sinclair who became secretary to OC GUAS Wg Cdr Kenneth Harries Riversdale-Elliot on 13th January 1941. Her unique commitment to the Squadron spanned 40 years of distinguished service until 1981. 

- date: Mar 1941
  img: 
  title: The first normal entry course begin training at GUAS
  desc: Initial training consisted of traditional ground training and concurrent air experience flights at Prestwich, Abbotsinch and Turnhouse airfields which implemented the use of a D.H. 60 Moth, a Fairy Fulmer Aircraft and a Tiger Moth aircraft respectively. The Squadron was initially parented by No 18 Balloon Centre and attached to the University of Glasgow chemistry lab was a link trainer fitted with panorama of which recruits made full use.

- date: Apr 1941
  img:
  title: Wg Cdr Robert Sorel-Cameron becomes OC GUAS
  desc: Following a short three month command of GUAS, Wg Cdr Riversdale-Elliot was succeeded by Wg Cdr Robert Sorel-Cameron, whose career began in 602 City of Glasgow Sqn for the Royal Auxiliary Air Force in 1930.  Shortly afterwards, he joined the RAF full time as a pilot in No 16 Sqn and No 28 Sqn, before receiving a commission in 1936 as the rank of Flt Lt.  He later became a QFI, with a posting to GUAS in 1941 and no sooner departed to take part in the second world war.  In 1944 he was awarded the Air Force Cross and then posted to hostilities planning with Air Headquarters in the East Indies.  His illustrious career earned him the Burma Star, Distinguished Flying Cross, Defence Medal, War Medal, General Service Medal and Queen Elizabeth II Coronation medal, not to mention a CBE for distinguished service during the final stages of operation in South East Asia in 1946.  Following postings as OC RAF Tengah in Singapore and OC RAF Cottesmore he joined HM Diplomatic Corps and was the Queen's Messenger for 12  years as well as Air Attache Athens for two.  In 1962 he retired following a promotion to Air Commodore.

- date: 1941
  img:
  title:  Wg Cdr Alister William Stewart Matheson becomes OC GUAS
  desc: After the departure of Wg Cdr Sorel-Cameron from GUAS, the Sqn was commanded until February 1943 by Wg Cdr Alister William Stewart Matheson.  Following his time at GUAS, he was posted to 106 Sqn and sadly died during a fighter affiliation exercise, when his Wellington MK3 lost its starboard wing outboard of the starboard engine, killing all crew onboard.

- date: 1941
  img:
  title: A Squadron badge is proposed
  desc: The suggestion for a Squadron badge was first proposed in 1941, originally proposing that the badge include the University of Glasgow coat of arms along with the RAF eagle and Royal crown.

- date: Feb 1943
  img:
  title: Sqn Ldr Patrick D'Amore Lister becomes OC GUAS
  desc: The Sqn was commanded by Sqn Ldr Patrick D'Amore Lister until the end of the war, when Flt Lt Desmond Fred Ruchwaldy took command until March 1946, who had a remarkable time during the war.  After joining in 1940, he was posted to 603 Sqn as a Sgt receiving the Distinguished Flying Medal in 1942 for participating in multiple sorties and successfully destroying at least 2 enemy aircraft.  Shortly afterwards, however, he was severely injured in a flying accident which fractured his spine.  Nevertheless, he recovered quickly and by 1943 had received a commission and was part of 129 Sqn.  In 1944 he was awarded the distinguished flying cross for displaying skill, courage and resource of a high order and destroying 7 enemy aircraft.  He left GUAS in 1946 and sadly was killed two months later while doing low-level aerobatics in a Tiger Moth aircraft.

- date: Mar 1945
  img:
  title: Commanding Officer post is changed
  desc: The post of Commanding Officer was downgraded to Flight Lieutenant, but this wasn't sustained for very long and shortly afterwards was returned to a Squadron Leader post. In 1952 it was upgraded to Wing Commander, when quite rightly so, Glasgow, in common with Oxford, Cambridge and London became a Grade I Squadron with an establishment of 100 students. 

- date: 1946
  img:
  title: Sqn Ldr Robert Alexander Innes becomes OC GUAS
  desc: Sqn command was passed to Sqn Ldr Robert Alexander Innes for the next three years, a pilot who had experience flying Hurricanes during the war.  In 1941 he crashed twice during the AXIS air raids due to attacks by ME109s and was known to have destroyed several enemy aircraft.  The second crash left him injured and he spent 6 months in hospital, ultimately preventing him from continuing to fly.  Instead, he trained as a flying instructor, being posted to Central Flying School, Hornchurch and then GUAS.  His time at the Sqn came to an end in 1949 when he returned to Malta to reform 185 Sqn as the new commanding officer. His time in the air force came to an end after his retirement as Sqn Ldr in 1961.  

- date: 1946
  img: 
  title: GUAS becomes part of the RAFVR
  desc: The Squadron's connection with the Air Training Corps was severed and instead GUAS, along with a number of other University Air Squadrons, subsequently became part of the RAFVR in 1946.

- date: 28 Mar 1946
  img: 
  title: First solo flight is achieved on GUAS
  desc: The first solo flight by a student from the Squadron was made.

- date: Jul 1946
  img: images/tigermoth.jpg
  title: Miles Magister aircraft is introduced
  desc: The Squadron received their first Miles Magister in July 1946.  Over the course of the following year, until August 1947, the Squadron flew Magisters only, before becoming equipped with Tiger Moths which then became the Squadron's primary aircraft of choice. 

- date: Summer 1946
  img: 
  title: First summer camp is held
  desc: Summer camps became an integral part of Squadron life and the Squadron's first summer camp was held in 1946 at Scone Aerodrome. Over the course of the next three years the camps would continue to run here alongside the company of the other Scottish University Air Squadrons with the addition of the Queen's U.A.S. Belfast for two of those.

- date: 1947
  img: images/ugsas.png
  title: Final draft of Squadron badge is created
  desc: The Squadron compiled their final draft of our badge which was composed of a white dove and a dark grey aircraft, with the motto "in utrumque paratus". The aircraft was not approved but instead a sword was suggested which conveyed the same message of war.

- date: 1947
  img: images/weir_trophy.png
  title: Weir Trophy is introduced
  desc: A hallmark of the Squadron, which is still awarded today, was introduced in 1947 when Lord Weir donated the Weir Trophy to the organisation which was to be awarded to the “best all Round Cadet”, in his first year. 

- date: 21 Jul 1948
  img: 
  title: Squadron receives badge
  desc: The Squadron badge was approved in 1948 by the King and on 21st July 1948, during the summer camp at Scone, the Air Officer Commanding, No. 66 Group, Air Commodore E.S. Burns, presented the Squadron with its badge. Reports suggest that it was not a fine summer's day, and the ceremony was held in one of the hangars. 

- date: 1950
  img:
  title: First camp held at RAF Dyce
  desc: For the first time since the Squadron's formation, the Easter Camp of 1950 was held away from Scone, and instead it was held at R.A.F. Dyce. 

- date: 24 Oct 1950
  img:
  title: Abbotsinch flying facilities became unavailable to GUAS
  desc: The Squadron was informed by Abbotsinch, that flying facilities would not be available for Glasgow UAS because of work which was scheduled to be conducted on the runway. 

- date: Dec 1950
  img:
  title: Flying moves to Scone
  desc: In December after various fields were suggested, a 'temporary' move was made to Scone airfield at Perth, some 70 miles from Glasgow. When the time came to return to Abbotsinch, the Squadron made a strong plea to remain at Scone because flying training had increased fivefold at Perth; this was brought about by the better weather factor, and the advantage of not being within the Renfrew control zone. Clear skies here and relatively clear weather, for Scotland, encouraged the Squadron to remain here for the next 18 years. The Squadron continued to operate from Scone, and the intensity of flying was not only maintained but increased. In addition, the fact that undergraduates had to live together at Perth over the weekend did much to foster Squadron bonding.

- date: 1951
  img: images/chipmunk.png
  title: Tiger Moth is replaced by Chipmunk
  desc: The Tiger Moth's tenure with the Squadron came to an end and it was quickly replaced with the Squadron's first Chipmunk trainers which was delivered just in time for the first annual competition among the University Air Squadrons, the 'Scone' Trophy. The competition involved the students competing in four areas - spot Landings, solo navigation, aerobatics and ground school knowledge. This first annual competition was held in October of 1951 and was quickly won by Glasgow UAS, soon becoming a yearly tradition.

- date: 1952
  img:
  title: Hack Trophy is introduced
  desc: The Hack trophy, which is awarded to the "all round best Squadron", was first presented to Glasgow UAS at the annual dinner of 1952. Over the course of the next three years, we then won the trophy a further 3 times leading Professor J.D. Mackie to present the Squadron with a silver cigarette box as a momento for having made such an achievement.

- date: 1957
  img:
  title: Squadron capacity is reduced
  desc: As the decade progressed, present economies being made within the Fighting Services promoted a review of the University Air Squadrons by the Inspector General in 1957, which resulted in Glasgow, along with all other Grade I Squadrons, having its student establishment reduced from 100 to 60 members, and the period of membership within the Squadron was limited to three years, except for those undergraduates who give a firm indication that they intend to go into the Royal Air Force on graduation. 

- date: 1961
  img:
  title: Squadron takes part in flypasts
  desc: The Squadron took part in a number of flypasts in the first half of the 1960s, including three Chipmunks flying over St John's Church in Sauchiehall Street, prior to the Battle of Britain Service being held there in 1961. Other activities during this time included a synchronised display of aerobatics by two of the Squadron's chipmunks at the RF Leuchars Battle of Britain Air Display in the September. 

- date: 27 Jan 1965
  img: 
  title: Squadron moves to 12 Park Circus
  desc: The old Headquarters at 11 Bute Gardens were demolished by the University Authorities to make way for expansion of its grounds and the Squadron officially moved into 12 Park Circus on 27th of January 1965 from Glasgow University Air Squadron to “Universities of Glasgow and Strathclyde Air Squadron.” The change was necessitated by the Royal College of Science and Technology, which was affiliated to Glasgow University, gaining its charter to become the University of Strathclyde. 

- date: 1968
  img:
  title: Squadron wins Scone Trophy
  desc: The Scone Trophy was yet again one by the Squadron in 1968 and to commemorate the Royal Air Force reaching its 50 year anniversary, Quaichs were presented to all the Scottish UAS OC's at the Bicester Summer Camp.

- date: July 1968
  img:
  title: UAS control passes to No. 22 Group
  desc: On the following July, control of the University Air Squadrons passed from No. 25 Group, which was disbanded, to No. 22 Group.

- date: Winter 1968
  img:
  title: Flying moves back to Abbotsinch
  desc: On 26th of November 1968, more change was to come when Group Captain Maddox and Squadron Leader Wood (both of 22 Group) and the Squadron Commander visited Abbotsinch to discuss with the Airport Director the possibility of the UGSAS Flying Element returning permanently to Abbotsinch. This came in good preparation as during the Christmas camp at Scone when it was found that with the grass areas unfit for use this year, and all activity was on one small runway which was unacceptable, which lead to the decision to hold the second period of Christmas Camp at Abbotsinch and this is where the Squadron decided to continue to return to permanently. It took until 1 Nov 1970 to complete the move back to Abbotsinch.

- date: 1969
  img:
  title: Squadron cut-backs imposed
  desc: Further restrictive changes were placed upon the Squadron as it was reduced in strength from 60 to 33 student members and the number of staff and aircraft reduced to four. Membership on the Squadron was also now restricted to two years unless students were seriously contemplating a career in the RAF. The changes were to be all implemented by the end of 1969 and were not well received with many Squadron members surprised and dismayed at the extent of the changes. 

- date: 1969
  img:
  title: Squadron wins the Hack Trophy
  desc: The end of the decade was to end on a high, with the Squadron winning the Hack Trophy which was presented at Ternhill by Wg Cdr Rufal Hack to Acting Pilot Officer HG Mackay. Mackay was a Civil Engineering student and won the Trophy for the third time in less than ideal weather conditions. A congratulatory message from the Trophy donor suggested renaming the Trophy the “MACKHACK”.

- date: Jan 1971
  img: 
  title: Squadron celebrates 30th anniversary
  desc: With the Squadron turning 30, celebrations began in 1971.  This also marked the 30th anniversary of Squadron Secretary Margaret Sinclair's time with the Squadron.

- date: 1971
  img:
  title: Royal Air Force College takes command of University Air Squadrons
  desc: University Air Squadrons passed from HQ22 Group to the Command of the Royal Air Force College. 

- date: 1973
  img: 
  title: University Air Squadrons suffer fuel shortages
  desc: The events of 1973 saw the Oil and Petroleum exporting nations, lead by Saudi Arabia, declare an oil embargo, targeting allied nations, including the UK, who were seen to be supporting Israel during the Yom Kippur War. University Air Squadrons were not immune from these effects and as a result, had their fuel allocation reduced by 50%. Their primary, secondary and any additional tasking were temporarily reduced by 25%, severely disrupting activities both on the ground and in the air. 

- date: 1974
  img: images/bulldog.png
  title: The Bulldog replaces the Chipmunk
  desc: In 1974, the Squadron said goodbye to the faithful Chipmunk and welcomed the arrival of the Scottish Aviation T.1 Bulldog. Over the course of the year, the Squadron was to be equipped with 4 more aircraft and all instructors had their first students out training in the Bulldog by April.  In celebration of their new aircraft, a number of selected people were given flights in the Bulldogs including members of Abbotsinch ATC and the Glasgow University Appointments Officer.  One of the first outings for the new Bulldogs was a four-ship flypast over the Eaglesham Fair on 18th of May 1974 and the Squadron Commander also gave a display in one of the Bulldogs at the Strathallen Air Display on 20th July 1974 and at RAF Leuchars Battle of Britain Day on 14th of September 1974 and again the following year. 

- date: 1975
  img:
  title: Paisley College of Technology students can join the Squadron
  desc: 1975 saw the acceptance of students from Paisley College of Technology, who were now able to apply for a position within the Squadron. 

- date: 1975
  img:
  title: Squadron loses Hangar 10 at Abbotsinch
  desc: Competition grew for hangar space in 1975, and in the November, the Squadron were informed by Abbotsinch airport management that Loganair wanted the use of the whole of Hangar 10 at the airport. Loganair was a more profitable organisation to the airport, they were told they would have to move out by May 1976 and were offered the end of Hangar 12 or space for an RAF hangar by the flying element.

- date: 1981
  img:
  title: Margaret Sinclair Retires
  desc: 1981 witnessed the end of an era within its organisation with the retirement of Margaret Sinclair after 40 years as secretary of the Squadron, having worked there for its entire existence since 1941.

- date: 1985
  img:
  title: First female students join the Squadron
  desc: The most notable event recorded for UGSAS during the 1980s was the introduction of female students in 1985. Initially many current students were unhappy with the move but the four women who joined 49 course - Rowena Sparrow, Nicola Tomaso, Lindsey Watson and Susan Beck - were quick to fit in. 

- date: Oct 1990
  img:
  title: More Squadron success with the Scone Trophy
  desc: The 1990's got off to a strong start during the yearly flying competition which was held at RAF Turnhouse in October 1990. During the competition, Acting Pilot Officer Alice Deacon of UGSAS rose to prominence by becoming the first female to win the aerobatic competition for the Scone Trophy.

- date: Late 1990's
  img:
  title: Mrs MacNeil joins the Squadron as Adjutant
  desc: The end of the decade ended with the addition of another staff member Nichola McNeil, or Adj as she is fondly known by her students, who went on to be awarded two commendations throughout her career, one from the Chief of the Air Staff and another Air Officer Commanding 22 commendation for meritorious service. 

- date: 21 Jul 2000
  img:
  title: UGSAS wins the UAS Trophy
  desc: The start of the new century started off with the Squadron winning the UAS Trophy which was presented to OC Squadron Leader JG MGath on 21st of July 2000 at the Royal International Air Tattoo.

- date: Feb 2000
  img: images/tutor.jpg
  title: Grob 115E Tutors become the primary aircraft at the flying element
  desc: They first arrived in February 2000 with the following three arriving a month later in circus formation as a nod to the Squadron's THQ at Park Circus. Shortly afterwards, in 2002, the Tutor was in its first accident at UGSAS with one suffering from engine failure and being forced to land in Alexandria.  


